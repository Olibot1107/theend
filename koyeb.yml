name: http-proxy
services:
  - name: proxy
    type: web
    git:
      branch: main
    build:
      buildpack: nodejs
    run:
      command: node index.js
    ports:
      - port: 8888
        protocol: http
    env:
      - key: PORT
        value: "8888"
      # Uncomment and set a secret token to lock down your proxy:
      # - key: PROXY_TOKEN
      #   value: "your-secret-token-here"
    scaling:
      min: 1
      max: 1
